# eruption-forecast ForecastModel configuration example
# Copy this file to config.yaml and adjust the values for your run.
# Load with: ForecastModel.from_config("config.yaml").run()
version: '1.0'

model:
  station: OJN              # Station code (e.g. OJN, MEPAS)
  channel: EHZ              # Channel code (e.g. EHZ, BHZ)
  network: VG               # SEED network code
  location: '00'            # SEED location code (empty string allowed)
  day_to_forecast: 2        # Days before eruption used as the forecast horizon
  output_dir: null          # Override default output directory (null = auto)
  root_dir: null            # Root directory anchor for relative output paths (null = cwd)
  overwrite: false          # Overwrite existing output files
  n_jobs: 1                 # Parallel workers for the outer pipeline
  verbose: false

calculate:
  start_date: '2025-03-16'  # Tremor calculation start date (YYYY-MM-DD)
  end_date: '2025-03-22'    # Tremor calculation end date (YYYY-MM-DD)
  source: sds               # Data source: 'sds' or 'fdsn'
  methods: null             # Tremor methods (null = all: rsam + dsar + entropy)
  remove_outlier_method: maximum   # Outlier removal: 'maximum' or 'all'
  remove_tremor_anomalies: false   # Remove anomalous windows via Z-score
  interpolate: true         # Interpolate gaps in the tremor time-series
  value_multiplier: null    # Scale tremor values (null = no scaling)
  cleanup_daily_dir: false  # Delete per-day CSV files after merging
  plot_daily: false         # Plot each day's tremor data
  save_plot: false          # Save merged tremor plot to disk
  overwrite_plot: false     # Overwrite existing tremor plots
  sds_dir: D:/Data/OJN      # SDS archive root (required when source='sds')
  client_url: https://service.iris.edu  # FDSN client URL (used when source='fdsn')
  minimum_completion_ratio: 0.3   # Minimum daily completion to accept a file
  overwrite: null           # null = inherit from model.overwrite
  n_jobs: null              # null = inherit from model.n_jobs
  verbose: null             # null = inherit from model.verbose

train:
  start_date: '2025-03-16'  # Training period start date (YYYY-MM-DD)
  end_date: '2025-03-22'    # Training period end date (YYYY-MM-DD)
  eruption_dates:           # Known eruption dates (YYYY-MM-DD)
    - '2025-03-20'
  window_step: 12           # Step between consecutive label windows
  window_step_unit: hours   # 'minutes' or 'hours'
  label_builder: standard   # 'standard' or 'dynamic'
  days_before_eruption: null   # Required when label_builder='dynamic'
  classifiers: rf           # Classifier key or list (e.g. ['rf', 'xgb'])
                            # Options: rf, lite-rf, gb, xgb, svm, lr, nn, dt, knn, nb, voting
  cv_strategy: shuffle-stratified  # 'shuffle', 'stratified', 'shuffle-stratified'
  cv_splits: 5              # Number of CV splits
  scoring: balanced_accuracy   # sklearn scoring metric for GridSearchCV
  number_of_features: 20    # Top-N features retained per seed
  include_eruption_date: true   # Label the eruption date itself as erupted
  select_tremor_columns: null   # Subset of tremor columns (null = all)
  save_tremor_matrix_per_method: true  # Save a separate tremor matrix per column
  exclude_features: null    # tsfresh feature names to skip (null = none)
  minimum_completion: 1.0   # Minimum fraction of valid samples per window
  seeds: 10                 # Number of independent training seeds
  resample_method: auto     # 'under', 'over', null, or 'auto'
  minority_threshold: 0.15  # Minority ratio that triggers undersampling under 'auto'
  sampling_strategy: 0.75   # Sampling ratio forwarded to the resampler
  plot_features: true       # Save feature-importance plots
  output_dir: null          # null = use station_dir
  overwrite: null           # null = inherit from model.overwrite
  n_jobs: null              # null = inherit from model.n_jobs
  n_grids: 1                # Grid-search iterations per seed
  use_cache: true           # Consult the content-addressable training cache
  verbose: null             # null = inherit from model.verbose

predict:
  start_date: '2025-03-23'  # Forecast period start date (YYYY-MM-DD)
  end_date: '2025-03-30'    # Forecast period end date (YYYY-MM-DD)
  window_step: 12           # Step between consecutive forecast windows
  window_step_unit: hours   # 'minutes' or 'hours'
  save_seed_result: true    # Save the per-seed prediction CSV
  plot_threshold: 0.5       # Probability threshold drawn on the forecast plot
  plot_title: null          # Optional plot title override
  plot_pdf: true            # Also save the forecast plot as a PDF
  output_dir: null          # null = use station_dir
  overwrite: null           # null = inherit from model.overwrite
  n_jobs: null              # null = inherit from model.n_jobs
  use_cache: true           # Consult the content-addressable prediction cache
  verbose: null             # null = inherit from model.verbose

evaluate:
  model: prediction         # 'prediction' or 'training' — which model to evaluate
  eruption_dates: null      # null = reuse the dates captured during train()
  plot_per_seed: false      # Render per-seed evaluation plots
  plot_aggregate: true      # Render aggregate plots per classifier
  output_dir: null          # null = use station_dir
  overwrite: null           # null = inherit from model.overwrite
  n_jobs: null              # null = inherit from model.n_jobs
  verbose: null             # null = inherit from model.verbose
