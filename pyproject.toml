[build-system]
requires = ["uv_build"]
build-backend = "uv_build"

[project]
name = "eruption-forecast"
version = "0.1.0"
authors = [
    {name = "Martanto", email = "martanto@live.com"},
]
description = "Eruption forecast modelling"
readme = "README.md"
license = {file = "LICENSE"}
keywords = ["eruption", "forecast", "volcano", "volcanology", "seismic"]
requires-python = ">=3.11"
dependencies = [
    "obspy>=1.5.0",
    "tsfresh",
    "numba<0.63",
    "loguru",
    "pandas>=3.0.2",
    "pip>=26.0",
    "imbalanced-learn>=0.14.1",
    "scikit-learn>=1.4",
    "seaborn>=0.13.2",
    "xgboost>=3.2.0",
    "lightgbm>=4.6.0",
    "shap>=0.51.0",
    "python-dotenv>=1.2.2",
    "pip-system-certs>=5.3",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]

[dependency-groups]
dev = [
    "uv-build",
    "ruff",
    "ty",
    "ipykernel",
    "notebook",
    "pytest>=9.0.3",
    "ipywidgets>=8.1.8",
    "pandas-stubs>=3.0.0.260204",
]

[tool.pytest.ini_options]
markers = [
    "integration: tests that send real external requests (e.g. Telegram API)",
]

[tool.uv]
cache-dir = "./.cache/uv"
build-constraint-dependencies = ["setuptools==80.8.0"]

[project.urls]
Homepage = "https://github.com/martanto/eruption-forecast"
Issues = "https://github.com/martanto/eruption-forecast/issues"
